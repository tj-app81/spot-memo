<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>スポットメモ — 行く場所にメモ、近くで通知</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PWA（ホーム画面追加・通知用） -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="スポットメモ" />
</head>
<body>
  <!-- 地図（全画面） -->
  <div id="map"></div>

  <!-- 検索バー（上に浮かぶ） -->
  <div id="searchbar">
    <form id="search-form">
      <span class="icon">🔍</span>
      <input id="search-input" type="text" placeholder="店名や住所で検索" autocomplete="off" />
    </form>
  </div>

  <!-- 見守りステータス（ONのとき表示） -->
  <p id="watch-status"></p>

  <!-- アプリ内通知カード -->
  <div id="inapp-note" class="hidden">
    <button id="inapp-close" type="button">✕</button>
    <div class="inapp-title"></div>
    <div class="inapp-body"></div>
    <div class="inapp-hint">タップで地図を移動</div>
  </div>

  <!-- 下部バー -->
  <nav id="bottombar">
    <button id="list-toggle" type="button">📝 リスト</button>
    <button id="nearby-btn" type="button">📍 近くのメモ</button>
    <button id="watch-toggle" type="button" title="見守り設定">🔕</button>
  </nav>

  <!-- ベルメニュー（見守り設定） -->
  <div id="bell-menu" class="hidden">
    <button id="bell-on" type="button">🔔 見守りON</button>
    <button id="bell-off" type="button">🔕 見守りOFF</button>
    <button id="bell-test" type="button">✉️ テスト通知</button>
  </div>

  <!-- 近くのメモ（下からスライドするシート） -->
  <div id="nearby" class="hidden">
    <div class="sheet-handle"></div>
    <h2>近くのメモ</h2>
    <div id="nearby-list"></div>
  </div>

  <!-- 場所一覧（下からスライドするシート） -->
  <div id="sheet" class="hidden">
    <div class="sheet-handle"></div>
    <h2>メモリスト</h2>
    <div id="place-list"></div>
    <div id="add-row">
      <button id="add-chain" type="button">🏪 チェーン店メモ</button>
      <button id="add-category" type="button">🛒 カテゴリメモ</button>
    </div>
    <div id="add-cat-row" class="hidden">
      <button type="button" data-cat="supermarket">🛒 スーパー</button>
      <button type="button" data-cat="convenience_store">🏪 コンビニ</button>
      <button type="button" data-cat="drugstore">💊 ドラッグストア</button>
      <button type="button" data-cat="custom">➕ 自分で入力</button>
    </div>
    <div id="settings">
      <h3>通知距離</h3>
      <label>📍 場所ピン
        <select id="pin-dist">
          <option value="100">100m</option>
          <option value="300">300m</option>
          <option value="500">500m</option>
          <option value="1000">1km</option>
        </select>
      </label>
      <label>🏪 チェーン・カテゴリ
        <select id="chain-dist">
          <option value="50">50m</option>
          <option value="100">100m</option>
          <option value="150">150m</option>
          <option value="300">300m</option>
          <option value="500">500m</option>
        </select>
      </label>
    </div>
  </div>

  <!-- ピン詳細（下からスライドするシート） -->
  <div id="panel" class="hidden">
    <div class="sheet-handle"></div>
    <div class="panel-head">
      <input id="place-name" type="text" placeholder="場所の名前（例：とらや）" />
      <button id="panel-close" title="閉じる">✕</button>
    </div>
    <form id="item-form">
      <input id="item-input" type="text" placeholder="やること・買うもの（例：羊羹を買う）" autocomplete="off" />
      <button type="submit">追加</button>
    </form>
    <ul id="item-list"></ul>
    <button id="delete-place" class="danger">この場所を削除</button>
  </div>

  <!-- 写真添付用（非表示のファイル選択） -->
  <input id="photo-input" type="file" accept="image/*" hidden />

  <!-- 写真の拡大表示 -->
  <div id="lightbox" class="hidden">
    <img id="lightbox-img" alt="写真" />
    <div class="lightbox-actions">
      <button id="lightbox-delete">写真を削除</button>
      <button id="lightbox-close">閉じる</button>
    </div>
  </div>

  <!-- アプリ本体（initApp を定義） -->
  <script src="app.js"></script>

  <!-- Google Maps を読み込み（読み込み完了後 initApp が呼ばれる） -->
  <!-- ↓↓↓ key= のあとがAPIキー。差し替えるときはここを編集 ↓↓↓ -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAXcynTyYELXFxTkvM8EF20qPsMVLeggTU&libraries=places&language=ja&region=JP&callback=initApp&loading=async"
    async
  ></script>
</body>
</html>
